name: Auto Sync from Gitee

on:
  schedule:
    # 每 5 分钟运行一次
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.PAT_GITHUB }}  # 需要配置个人访问令牌
    
    - name: Check and Sync from Gitee
      run: |
        git remote add gitee https://gitee.com/travisgogogo/baby-growth.git
        git fetch gitee main
        
        # 获取 Gitee 和 GitHub 的最新 commit hash
        GITEE_HASH=$(git rev-parse gitee/main)
        GITHUB_HASH=$(git rev-parse origin/main)
        
        echo "Gitee: $GITEE_HASH"
        echo "GitHub: $GITHUB_HASH"
        
        if [ "$GITEE_HASH" != "$GITHUB_HASH" ]; then
          echo "Changes detected, syncing..."
          git checkout main
          git reset --hard gitee/main
          git push origin main --force
          git push origin --tags --force
          echo "Sync completed!"
        else
          echo "No changes, skip sync."
        fi