name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

# 避免重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    # 缓存 Gradle
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}
    
    # 缓存 Flutter
    - name: Cache Flutter
      uses: actions/cache@v4
      with:
        path: /opt/hostedtoolcache/flutter
        key: flutter-3.24.0
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    # 缓存模型文件
    - name: Cache Model
      id: cache-model
      uses: actions/cache@v4
      with:
        path: assets/models/paraformer-zh-tiny.onnx
        key: model-paraformer-zh-tiny
    
    - name: Download model file
      if: steps.cache-model.outputs.cache-hit != 'true'
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Setup Signing
      run: |
        # Create keystore from base64 secret
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
        # Create key.properties
        cat > android/key.properties << EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=keystore.jks
        EOF
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK to Artifact
      if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Upload APK to Release (tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        name: "宝宝成长记 v${{ steps.version.outputs.version }}"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK to Release (workflow dispatch)
      if: github.event_name == 'workflow_dispatch'
      run: |
        VERSION="v${{ steps.version.outputs.version }}"
        # Find or create release
        RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION" 2>/dev/null || echo '{}')
        RELEASE_ID=$(echo "$RELEASE_DATA" | grep '"id":' | head -1 | sed 's/.*: //;s/,//')
        
        if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
          # Create release
          RELEASE_DATA=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$VERSION\",\"name\":\"宝宝成长记 $VERSION\",\"draft\":false,\"prerelease\":false}")
          RELEASE_ID=$(echo "$RELEASE_DATA" | grep '"id":' | head -1 | sed 's/.*: //;s/,//')
        fi
        
        # Upload APK
        curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/vnd.android.package-archive" \
          "https://uploads.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets?name=app-release.apk" \
          --data-binary @build/app/outputs/flutter-apk/app-release.apk
