name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Create Android Project
      run: |
        # Remove incomplete android directory if exists
        rm -rf android
        # Create Android platform files with overwrite flag
        flutter create --platforms=android --overwrite .
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
