name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create Flutter project with Android support
      run: |
        # Create a new temp project with Android platform
        flutter create --platforms=android --project-name=baby_growth temp_project
        
        # Copy the generated android folder to our project
        cp -r temp_project/android .
        
        # Copy other platform files if needed
        cp -r temp_project/.metadata .
        
        # Clean up
        rm -rf temp_project
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
