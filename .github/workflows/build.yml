name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Download model file
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK to Artifact
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        name: "宝宝成长记 v${{ steps.version.outputs.version }}"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Download model file
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Build iOS
      run: |
        cp pubspec.yaml pubspec.yaml.bak
        flutter create --platforms=ios . --project-name baby_growth
        cp pubspec.yaml.bak pubspec.yaml
        rm pubspec.yaml.bak
        flutter pub get
        flutter build ios --simulator
        echo "iOS simulator build completed successfully"
    
    - name: Upload iOS
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-ios-simulator
        path: build/ios/iphonesimulator/Runner.app
        retention-days: 30
