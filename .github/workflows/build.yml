name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create new Flutter project with Android support
        cd /tmp
        flutter create --platforms=android temp_project
        
        # Replace lib directory
        rm -rf temp_project/lib
        cp -r $GITHUB_WORKSPACE/lib temp_project/
        
        # Create correct pubspec.yaml
        cat > temp_project/pubspec.yaml << 'EOF'
name: baby_growth
description: 宝宝成长记录
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  fl_chart: ^0.65.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
EOF
        
        # Build
        cd temp_project
        flutter pub get
        flutter build apk --release
        
        # Copy APK back
        mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
