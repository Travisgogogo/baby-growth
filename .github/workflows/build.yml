name: Build APK and iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Download model file
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Build APK
      run: |
        # Show configuration for debugging
        echo "=== android/app/build.gradle ==="
        cat android/app/build.gradle
        
        echo "=== android/settings.gradle ==="
        cat android/settings.gradle
        
        flutter pub get
        
        # Clean gradle cache to avoid record_android plugin issues
        cd android
        ./gradlew clean || true
        rm -rf ~/.gradle/caches/
        cd ..
        
        # Build APK - no flutter create needed, project structure is in repo
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Download model file
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Build iOS
      run: |
        # Backup pubspec.yaml before flutter create
        cp pubspec.yaml pubspec.yaml.bak
        
        # Create iOS project structure (not included in repo)
        flutter create --platforms=ios . --project-name baby_growth
        
        # Restore pubspec.yaml with our dependencies
        cp pubspec.yaml.bak pubspec.yaml
        rm pubspec.yaml.bak
        
        flutter pub get
        flutter build ios --simulator
        
        echo "iOS simulator build completed successfully"
    
    - name: Upload iOS
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-ios-simulator
        path: build/ios/iphonesimulator/Runner.app
        retention-days: 30
