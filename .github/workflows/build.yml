name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Generate Android project
      run: |
        # Save current project files
        mkdir -p /tmp/project_backup
        cp -r lib pubspec.yaml /tmp/project_backup/ 2>/dev/null || true
        
        # Create new Flutter project with Android support in temp dir
        cd /tmp
        flutter create --platforms=android --project-name=baby_growth temp_proj
        
        # Copy generated android directory to workspace
        cp -r /tmp/temp_proj/android ${{ github.workspace }}/
        
        # Clean up
        rm -rf /tmp/temp_proj /tmp/project_backup
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
