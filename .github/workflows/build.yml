name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create new Flutter project with Android support
        cd /tmp
        flutter create --platforms=android temp_project
        
        # Replace lib directory
        rm -rf temp_project/lib
        cp -r ${{ github.workspace }}/lib temp_project/
        
        # Replace pubspec.yaml but keep SDK constraints
        head -20 temp_project/pubspec.yaml > /tmp/pubspec_template.yaml
        cat ${{ github.workspace }}/pubspec.yaml | grep -E "^(name:|description:|version:|environment:|dependencies:)" >> /tmp/pubspec_template.yaml
        cp /tmp/pubspec_template.yaml temp_project/pubspec.yaml
        
        # Build
        cd temp_project
        flutter pub get
        flutter build apk --release
        
        # Copy APK back
        mkdir -p ${{ github.workspace }}/build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
