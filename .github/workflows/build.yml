name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create simple pubspec without native plugins
        cat > pubspec_simple.yaml << 'EOF'
name: baby_growth
description: 宝宝成长记录
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.65.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
EOF
        
        # Create Flutter project
        cd /tmp
        flutter create --platforms=android myapp
        
        # Copy lib
        rm -rf myapp/lib
        cp -r $GITHUB_WORKSPACE/lib myapp/
        
        # Use simple pubspec (without sqflite)
        cp $GITHUB_WORKSPACE/pubspec_simple.yaml myapp/pubspec.yaml
        
        # Build
        cd myapp
        flutter pub get
        flutter build apk --release
        
        # Copy APK
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: app-release.apk
        retention-days: 30
