name: Build APK and iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        cd /tmp
        rm -rf myapp
        flutter create --platforms=android myapp
        
        rm -rf myapp/lib
        cp -r $GITHUB_WORKSPACE/lib myapp/
        cp $GITHUB_WORKSPACE/pubspec.yaml myapp/
        
        cd myapp
        
        # Fix Kotlin version to 1.9.0 to match dependencies
        sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "1.9.0"/' android/settings.gradle
        
        # Fix minSdkVersion
        sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
        
        # Fix compileSdkVersion to 35 for record plugin compatibility
        sed -i 's/compileSdk .*/compileSdk 35/' android/app/build.gradle
        sed -i 's/targetSdk .*/targetSdk 35/' android/app/build.gradle
        
        # Also fix flutter.compileSdkVersion if present
        sed -i 's/flutter.compileSdkVersion/35/' android/app/build.gradle
        
        flutter pub get
        
        # Fix record_android plugin build.gradle - replace flutter.compileSdkVersion with hardcoded value
        RECORD_PLUGIN_PATH="$HOME/.pub-cache/hosted/pub.dev/record_android-1.5.1/android/build.gradle"
        if [ -f "$RECORD_PLUGIN_PATH" ]; then
          echo "Fixing record_android plugin build.gradle..."
          sed -i 's/flutter\.compileSdkVersion/35/g' "$RECORD_PLUGIN_PATH"
          # Also fix ndkVersion if present
          sed -i 's/flutter\.ndkVersion/"27.0.12077973"/g' "$RECORD_PLUGIN_PATH"
          cat "$RECORD_PLUGIN_PATH"
        fi
        
        # Fix other plugins that might have similar issues
        find $HOME/.pub-cache/hosted/pub.dev -name "build.gradle" -path "*/android/build.gradle" 2>/dev/null | while read f; do
          if grep -q "flutter.compileSdkVersion" "$f" 2>/dev/null; then
            echo "Fixing: $f"
            sed -i 's/flutter\.compileSdkVersion/35/g' "$f"
          fi
          if grep -q "flutter.ndkVersion" "$f" 2>/dev/null; then
            echo "Fixing ndk: $f"
            sed -i 's/flutter\.ndkVersion/"27.0.12077973"/g' "$f"
          fi
        done
        
        flutter build apk --release
        
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: app-release.apk
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build iOS
      run: |
        cd /tmp
        rm -rf myapp
        flutter create --platforms=ios myapp
        
        rm -rf myapp/lib
        cp -r $GITHUB_WORKSPACE/lib myapp/
        cp $GITHUB_WORKSPACE/pubspec.yaml myapp/
        
        cd myapp
        
        # Configure iOS for simulator build (no code signing required)
        flutter pub get
        flutter build ios --simulator
        
        # Note: Device builds require Apple Developer account and code signing
        # For now, we only build for simulator
        echo "iOS simulator build completed successfully"
    
    - name: Upload iOS
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-ios-simulator
        path: myapp/build/ios/iphonesimulator/Runner.app
        retention-days: 30
