name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        cd /tmp
        rm -rf myapp
        flutter create --platforms=android myapp
        
        # Copy all project files
        rm -rf myapp/lib
        cp -r $GITHUB_WORKSPACE/lib myapp/
        cp $GITHUB_WORKSPACE/pubspec.yaml myapp/
        
        cd myapp
        
        # Fix Kotlin version for Flutter 3.24
        sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' android/settings.gradle
        
        # Fix minSdkVersion for sqflite
        sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
        
        flutter pub get
        flutter build apk --release
        
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: app-release.apk
        retention-days: 30
