name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Create Android project
      run: |
        # Create a new temp project with Android platform in /tmp
        cd /tmp
        flutter create --platforms=android --project-name=baby_growth temp_project
        
        # Copy the generated android folder to our project
        cp -r /tmp/temp_project/android ${{ github.workspace }}/
        
        # Copy metadata file
        cp -r /tmp/temp_project/.metadata ${{ github.workspace }}/
        
        # Clean up
        rm -rf /tmp/temp_project
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
