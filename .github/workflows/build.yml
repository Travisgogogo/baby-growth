name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 避免重复运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    # 缓存 Gradle
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: gradle-${{ runner.os }}
    
    # 缓存 Flutter
    - name: Cache Flutter
      uses: actions/cache@v4
      with:
        path: /opt/hostedtoolcache/flutter
        key: flutter-3.24.0
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
        cache: true
    
    # 缓存模型文件
    - name: Cache Model
      id: cache-model
      uses: actions/cache@v4
      with:
        path: assets/models/paraformer-zh-tiny.onnx
        key: model-paraformer-zh-tiny
    
    - name: Download model file
      if: steps.cache-model.outputs.cache-hit != 'true'
      run: |
        mkdir -p assets/models
        curl -L -o assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx" || \
        wget -O assets/models/paraformer-zh-tiny.onnx \
          "https://huggingface.co/csukuangfj/sherpa-onnx-paraformer-zh-2023-09-14/resolve/main/model.onnx"
    
    - name: Get version
      id: version
      run: |
        VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        name: "宝宝成长记 v${{ steps.version.outputs.version }}"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
