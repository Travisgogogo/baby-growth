name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create Flutter project
        cd /tmp
        flutter create --platforms=android myapp
        
        # Copy lib
        rm -rf myapp/lib
        cp -r $GITHUB_WORKSPACE/lib myapp/
        
        # Copy pubspec.yaml
        cp $GITHUB_WORKSPACE/pubspec.yaml myapp/
        
        # Build
        cd myapp
        flutter pub get
        flutter build apk --release
        
        # Copy APK
        mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
