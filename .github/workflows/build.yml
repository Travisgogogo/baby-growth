name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Generate Android project
      run: |
        # Create fresh Flutter project with all files
        cd /tmp
        rm -rf baby_growth_android
        flutter create --platforms=android --project-name=baby_growth baby_growth_android
        
        # Copy the generated android directory back
        cp -r /tmp/baby_growth_android/android ${{ github.workspace }}/
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      timeout-minutes: 20
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
