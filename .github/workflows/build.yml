name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create a new Flutter project with all platforms
        cd /tmp
        flutter create --project-name=baby_growth temp_project
        
        # Replace the lib directory with our code
        rm -rf temp_project/lib
        cp -r ${{ github.workspace }}/lib temp_project/
        
        # Replace pubspec.yaml
        cp ${{ github.workspace }}/pubspec.yaml temp_project/
        
        # Build APK in the temp project
        cd temp_project
        flutter pub get
        flutter build apk --release
        
        # Copy the built APK back
        mkdir -p ${{ github.workspace }}/build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
