name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Build APK
      run: |
        # Create Flutter project in /tmp to avoid git conflicts
        cd /tmp
        rm -rf baby_growth_build
        flutter create --project-name=baby_growth --platforms=android baby_growth_build
        
        # Copy project files
        cp -r $GITHUB_WORKSPACE/lib baby_growth_build/
        cp $GITHUB_WORKSPACE/pubspec.yaml baby_growth_build/
        
        # Build APK
        cd baby_growth_build
        flutter pub get
        flutter build apk --release
        
        # Copy APK back to workspace
        mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
        cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
