name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
        channel: 'stable'
    
    - name: Create Android Project
      run: |
        # Save current project files
        mkdir -p /tmp/project_backup
        cp -r lib pubspec.yaml /tmp/project_backup/
        
        # Remove everything except .git and .github
        find . -maxdepth 1 -not -name '.' -not -name '.git' -not -name '.github' -exec rm -rf {} \;
        
        # Create new Flutter project with same name
        flutter create --project-name=baby_growth --platforms=android .
        
        # Restore project files
        cp -r /tmp/project_backup/lib/* lib/
        cp /tmp/project_backup/pubspec.yaml .
    
    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: baby-growth-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
